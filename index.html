<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoMKT Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body>

    <div id="splash-screen"><img src="logo.png" id="logo-intro" class="splash-logo"></div>

    <div id="login-screen">
        <form class="form" id="login-form">
            <img src="logo.png" id="logo-login" class="login-visual-logo">
            <p id="heading">Acesso Interno</p>
            <div class="field"><span class="material-icons">email</span><input type="email" id="email" class="input-field" placeholder="E-mail" required></div>
            <div class="field"><span class="material-icons">lock</span><input type="password" id="password" class="input-field" placeholder="Senha" required></div>
            <button type="button" class="button1" id="btn-entrar">Acessar Sistema</button>
        </form>
    </div>

    <div id="app-container" style="display: none;">
        <aside class="sidebar">
            <div class="logo"><img src="logo.png" id="logo-menu" class="sidebar-logo"></div>
            <nav class="menu" id="main-nav">
                </nav>
            <div class="bottom-actions"><button class="menu-btn" id="btn-sair"><span class="material-icons">logout</span> Sair</button></div>
        </aside>

        <main class="content">
            <section id="home" class="tab-content active">
                <div class="header-top"><h1>Painel de Controle</h1></div>
                <div class="dashboard-grid">
                    <div class="card stat-card"><h3 style="color:#00ff88">Concluídas</h3><p id="resumo-concluidas">0</p></div>
                    <div class="card stat-card"><h3 style="color:#ffaa00">Em Aberto</h3><p id="resumo-andamento">0</p></div>
                    <div class="card stat-card"><h3 style="color:#ff3366">Pendentes</h3><p id="resumo-pendentes">0</p></div>
                </div>
            </section>

            <section id="agenda" class="tab-content">
                <div class="header-top agenda-header">
                    <h1>Agenda Colaborativa</h1>
                    <div>
                        <button class="btn-secundary" onclick="mudarVisaoAgenda('kanban')">Trello</button>
                        <button class="btn-secundary" onclick="mudarVisaoAgenda('calendario')">Calendário</button>
                        <button class="button1" style="width:auto; display:inline-block; padding:8px 15px;" onclick="abrirModal()">Novo</button>
                    </div>
                </div>
                <div id="visao-kanban" class="agenda-view active">
                    <div class="kanban-board">
                        <div class="kanban-column" id="coluna-vermelha"><h3>Pendente</h3><div class="cards-container" id="col-pendente"></div></div>
                        <div class="kanban-column" id="coluna-amarela"><h3>Em Andamento</h3><div class="cards-container" id="col-analise"></div></div>
                        <div class="kanban-column" id="coluna-verde"><h3>Concluído</h3><div class="cards-container" id="col-concluido"></div></div>
                    </div>
                </div>
                <div id="visao-calendario" class="agenda-view" style="display:none;"><div class="card"><div id='calendar-geral'></div></div></div>
            </section>

            <section id="planner" class="tab-content"><div class="header-top"><h1>Meu Planner</h1></div><div class="card"><div id='calendar-individual'></div></div></section>

            <section id="rh" class="tab-content">
                <div class="header-top"><h1>Gestão de Equipe</h1></div>
                <div class="rh-layout">
                    <div class="card">
                        <h3>Novo Colaborador</h3>
                        <form id="form-rh-completo">
                            <input type="text" id="rh-nome" class="modal-input" placeholder="Nome" required>
                            <input type="text" id="rh-cargo" class="modal-input" placeholder="Cargo">
                            <input type="email" id="rh-email" class="modal-input" placeholder="E-mail" required>
                            <input type="password" id="rh-senha" class="modal-input" placeholder="Senha" required>
                            <div class="permissions-grid" id="permissoes-cadastro">
                                <label><input type="checkbox" value="agenda" checked> Agenda</label>
                                <label><input type="checkbox" value="planner" checked> Planner</label>
                                <label><input type="checkbox" value="rh"> RH</label>
                                <label><input type="checkbox" value="admin"> Config</label>
                            </div>
                            <button type="submit" class="button1">Salvar</button>
                        </form>
                    </div>
                    <div class="card"><h3>Equipe</h3><div id="lista-colaboradores-cards" class="colaboradores-grid"></div></div>
                </div>
            </section>

            <section id="admin" class="tab-content">
                <div class="header-top"><h1>Configurações</h1></div>
                <div class="card">
                    <h3>Logos</h3>
                    <input type="file" id="up-logo-intro" class="modal-input">
                    <button class="button1" id="btn-save-logos">Salvar Logos</button>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-colaborador" class="modal-overlay" style="display:none;">
        <div class="modal-content large">
            <div class="modal-header"><h2 id="modal-rh-nome">Pasta</h2><button onclick="fecharModalRH()">Fechar</button></div>
            <div class="rh-details-grid">
                <div class="rh-actions">
                    <select id="rh-tipo-evento" class="modal-input"><option value="vale">Vale</option><option value="bonus">Bônus</option></select>
                    <input type="number" id="rh-valor-evento" class="modal-input" placeholder="Valor">
                    <button class="button1" id="btn-lancar-rh">Lançar</button>
                </div>
                <div class="rh-history"><div id="historico-rh-lista"></div></div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
