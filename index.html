<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoMkt Workspace</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon"> 
    
    <link rel="stylesheet" href="css/style.css">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="screen-active">
        <div class="login-card">
            <h2>LudoMkt.</h2>
            <p>Faça login para acessar o Workspace</p>
            
            <form id="login-form">
                <div class="input-group">
                    <span class="material-icons">email</span>
                    <input type="email" id="email" placeholder="E-mail corporativo" required>
                </div>
                <div class="input-group">
                    <span class="material-icons">lock</span>
                    <input type="password" id="password" placeholder="Senha" required>
                </div>
                <button type="button" class="btn-primary" onclick="alert('Login visual funcionou! Depois ligamos no Firebase.')">Entrar no Workspace</button>
            </form>
        </div>
    </div>

</body>
</html>
